<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MasterMart</title>
    <link rel="stylesheet" href="css/header.css">
    <script src="https://kit.fontawesome.com/e05d24f6c7.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <div class="logo">
            <img src="assets/MasterEagle.png" alt="Logo" />
            <span>ShopEase</span>
        </div>

        <div class="search-bar" id="searchBar">
            <input type="text" placeholder="Search products..." />
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="header-buttons">
            <button class="search-toggle" onclick="toggleSearch()" id="searchToggleBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button title="Cart"><i class="fa-solid fa-shopping-cart"></i></button>
            <button title="Wishlist"><i class="fa-solid fa-heart"></i></button>
            <div class="profile-menu">
                <button onclick="toggleDropdown(event)"><i class="fa-solid fa-user"></i></button>
                <div class="dropdown" id="profileDropdown">
                    <button onclick="alert('My Profile')">My Profile</button>
                    <button onclick="alert('Orders')">Orders</button>
                    <button onclick="toggleTheme()">Light/Dark</button>
                    <button onclick="alert('Logout')">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <script src="js/header.js"></script>
</body>

</html>
